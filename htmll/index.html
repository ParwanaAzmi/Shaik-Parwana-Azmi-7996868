<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Portal</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
        }
        video{
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px gray;
        }
        audio{
            margin-top: 20px;
            width: 300px;
        }
    </style>
</head>
<body>
    <nav>
        <h2>Community Portal</h2>
    </nav>
    <main>
        <h1>Welcome to Local Community Events</h1>
        <p>
            Explore and register for events happening near you.
        </p>
        <h2>🎉 Event Invitation Video</h2>
        <video controls autoplay muted width="700">
            <source src="videos/invite.mp4"
                    type="video/mp4">
            Your browser does not support video.
        </video>
        <h2>🎵 Background Music</h2>
        <audio controls>
            <source src="audio/music.mp3"
                    type="audio/mpeg">
            Your browser does not support audio.
        </audio>
    </main>
    <footer>
        <p>© 2026 Community Portal</p>
    </footer>
</body>
</html>
