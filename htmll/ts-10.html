<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Debugging Practice</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }
        .box{
            width: 300px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0px 4px 10px gray;
        }
        button{
            padding: 10px 18px;
            background-color: #0077ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐞 Debugging Demo</h1>
        <p id="message">
            Click button to test JavaScript
        </p>
        <button onclick="showMessage()">
            Click Me
        </button>
    </div>
    <script>
        function showMessage(){
            let username = "Parwana";
            console.log("Button Clicked");
            console.log("Username is:", username);
            document.getElementById("message").innerHTML =
            "Welcome " + username;
        }
    </script>
</body>
</html>
