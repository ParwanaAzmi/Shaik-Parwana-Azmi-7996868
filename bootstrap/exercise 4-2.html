<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4.2 - 4 Column Layout</title>

    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Section 4.2: Four Equal Columns</h2>
        
        <div class="row text-center text-white">
            
            <div class="col-12 col-sm-3 mb-3">
                <div class="bg-primary p-4 rounded shadow-sm">
                    <h5>Card 1</h5>
                    <p>Width: 3/12</p>
                </div>
            </div>

            <div class="col-12 col-sm-3 mb-3">
                <div class="bg-info p-4 rounded shadow-sm">
                    <h5>Card 2</h5>
                    <p>Width: 3/12</p>
                </div>
            </div>

            <div class="col-12 col-sm-3 mb-3">
                <div class="bg-warning text-dark p-4 rounded shadow-sm">
                    <h5>Card 3</h5>
                    <p>Width: 3/12</p>
                </div>
            </div>

            <div class="col-12 col-sm-3 mb-3">
                <div class="bg-danger p-4 rounded shadow-sm">
                    <h5>Card 4</h5>
                    <p>Width: 3/12</p>
                </div>
            </div>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
