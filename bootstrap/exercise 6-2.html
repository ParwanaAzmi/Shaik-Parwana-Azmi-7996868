<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7.2 - Flexbox Spacing</title>

    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="text-center mb-4">Section 6.2 Flexbox Card Spacing</h2>
        
        <div class="card shadow">
            
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0 text-dark fw-bold">Shopping Cart Summary</h5>
                <span class="badge bg-danger rounded-pill">2 Items</span>
            </div>

            <div class="card-body">
                <p class="card-text">Iphone 16 pro case</p>
                <p class="text-muted small">Tripod</p>
            </div>

            <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3">
                <span class="fw-bold">Total: Rs1000</span>
                <button class="btn btn-success btn-sm">Checkout Now</button>
            </div>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
